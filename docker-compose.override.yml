version: '3.8'

services:
  ambev.developerevaluation.webapi:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - ambev.developerevaluation.database
      - ambev.developerevaluation.nosql

  ambev.developerevaluation.database:
    ports:
      - "5432:5432"

  ambev.developerevaluation.nosql:
    ports:
      - "27017:27017"

  ambev.developerevaluation.cache:
    ports:
      - "6379:6379"
